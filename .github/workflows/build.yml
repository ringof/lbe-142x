name: Build Windows & GNU/Linux
on:
 push:
   branches: [ main, 'claude/**' ]
   tags:
     - 'v*'
 pull_request:
 workflow_dispatch:
jobs:
 build-windows:
   # Pin to windows-2022: the windows-latest image (now Server 2025) breaks the
   # "Visual Studio 17 2022" CMake generator detection ("could not find any
   # instance of Visual Studio"). windows-2022 ships VS 2022 and resolves it.
   runs-on: windows-2022
   steps:
   - uses: actions/checkout@v4
   
   - name: Set up MSVC
     uses: microsoft/setup-msbuild@v2
     
   - name: Set up CMake
     uses: lukka/get-cmake@latest

   - name: Configure CMake
     run: cmake -B ${{github.workspace}}/build -G "Visual Studio 17 2022" -A x64
     
   - name: Build
     run: cmake --build ${{github.workspace}}/build --config Release

   - name: Unit tests (ctest)
     run: ctest --test-dir ${{github.workspace}}/build -C Release --output-on-failure

   - name: Get version
     id: get_version
     run: |
       if ("${{ github.ref_type }}" -eq "tag") {
         $VERSION="${{ github.ref_name }}"
         $VERSION=$VERSION.Replace(".", "_")
         echo "version=$VERSION" >> $env:GITHUB_OUTPUT
       } else {
         echo "version=dev" >> $env:GITHUB_OUTPUT
       }
     shell: pwsh
     
   - name: Upload artifact
     uses: actions/upload-artifact@v4
     with:
       name: lbe-142x_${{ steps.get_version.outputs.version }}-windows
       path: |
         ${{github.workspace}}/build/bin/Release/lbe-142x.exe
         ${{github.workspace}}/build/bin/Release/libusb-1.0.dll

 build-linux:
   strategy:
     matrix:
       os: [ubuntu-22.04, ubuntu-24.04]
   runs-on: ${{ matrix.os }}
   steps:
   - uses: actions/checkout@v4
   
   - name: Set up CMake
     uses: lukka/get-cmake@latest
     
   - name: Install dependencies
     run: |
       sudo apt-get update
       sudo apt-get install -y libudev-dev
       
   - name: Configure CMake
     run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release
     
   - name: Build
     run: cmake --build ${{github.workspace}}/build

   - name: Parser self-test (no hardware)
     run: python3 python/test_lbe1425.py --self-test

   - name: Unit tests (ctest)
     run: ctest --test-dir ${{github.workspace}}/build --output-on-failure

   - name: Get version
     id: get_version
     run: |
       if [[ "${{ github.ref_type }}" == "tag" ]]; then
         VERSION="${{ github.ref_name }}"
         VERSION="${VERSION//./\_}"
         echo "version=$VERSION" >> $GITHUB_OUTPUT
       else
         echo "version=dev" >> $GITHUB_OUTPUT
       fi
     shell: bash

   - name: Upload artifact
     uses: actions/upload-artifact@v4
     with:
       name: lbe-142x_${{ steps.get_version.outputs.version }}-${{ matrix.os }}
       path: ${{github.workspace}}/build/bin/lbe-142x

 asan-ubsan:
   runs-on: ubuntu-24.04
   steps:
   - uses: actions/checkout@v4

   - name: Set up CMake
     uses: lukka/get-cmake@latest

   - name: Install dependencies
     run: |
       sudo apt-get update
       sudo apt-get install -y libudev-dev

   - name: Configure (ASan + UBSan)
     run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug -DLBE_SANITIZE=address,undefined

   - name: Build
     run: cmake --build ${{github.workspace}}/build

   - name: Unit tests under ASan/UBSan
     env:
       ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
       UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
     run: ctest --test-dir ${{github.workspace}}/build --output-on-failure

   - name: CLI smoke under ASan/UBSan
     env:
       ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
       UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
     run: ${{github.workspace}}/build/bin/lbe-142x --help

 valgrind:
   runs-on: ubuntu-24.04
   steps:
   - uses: actions/checkout@v4

   - name: Set up CMake
     uses: lukka/get-cmake@latest

   - name: Install dependencies
     run: |
       sudo apt-get update
       sudo apt-get install -y libudev-dev valgrind

   - name: Configure (Debug, unstripped)
     run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

   - name: Build
     run: cmake --build ${{github.workspace}}/build

   - name: Memcheck unit tests
     run: valgrind --error-exitcode=1 --leak-check=full ${{github.workspace}}/build/bin/lbe-tests

   - name: Memcheck CLI (--help)
     run: valgrind --error-exitcode=1 --leak-check=full ${{github.workspace}}/build/bin/lbe-142x --help
